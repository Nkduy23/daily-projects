<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomo — Pomodoro Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Nav -->
    <nav>
      <div class="nav-logo">
        <div class="nav-logo-mark">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <path
              d="M7 1a6 6 0 1 0 0 12A6 6 0 0 0 7 1zM2.5 7a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zm4.5-3a.75.75 0 0 1 .75.75v2.69l1.53 1.53a.75.75 0 1 1-1.06 1.06l-1.75-1.75A.75.75 0 0 1 6.25 7.5v-3A.75.75 0 0 1 7 4z"
            />
          </svg>
        </div>
        Pomo
      </div>
      <div class="nav-right">
        <div class="streak-chip" id="streak-chip">
          <span>🔥</span>
          <span id="streak-count">0</span> streak
        </div>
        <button class="icon-btn" id="sound-btn" title="Tắt/bật âm thanh">
          <svg id="sound-icon-on" width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
            <path
              d="M7.5 1.5a.5.5 0 0 0-.8-.4L3.2 4H1.5A1.5 1.5 0 0 0 0 5.5v4A1.5 1.5 0 0 0 1.5 11H3.2l3.5 2.9a.5.5 0 0 0 .8-.4V1.5zm3.3 1.8a.5.5 0 0 1 .7.1 7 7 0 0 1 0 8.2.5.5 0 0 1-.8-.6 6 6 0 0 0 0-7 .5.5 0 0 1 .1-.7zm-1.6 1.6a.5.5 0 0 1 .7.1 4.5 4.5 0 0 1 0 5.1.5.5 0 0 1-.8-.6 3.5 3.5 0 0 0 0-4 .5.5 0 0 1 .1-.6z"
            />
          </svg>
          <svg id="sound-icon-off" width="15" height="15" viewBox="0 0 15 15" fill="currentColor" style="display: none">
            <path
              d="M7.5 1.5a.5.5 0 0 0-.8-.4L3.2 4H1.5A1.5 1.5 0 0 0 0 5.5v4A1.5 1.5 0 0 0 1.5 11H3.2l3.5 2.9a.5.5 0 0 0 .8-.4V1.5zM12 5.5l1.5-1.5.7.7L12.7 6.2l1.5 1.5-.7.7L12 6.9l-1.5 1.5-.7-.7 1.5-1.5-1.5-1.5.7-.7L12 5.5z"
            />
          </svg>
        </button>
        <button class="icon-btn" id="settings-btn" title="Cài đặt">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
            <path fill-rule="evenodd" d="M7.5 5.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM4.5 7.5a3 3 0 1 1 6 0 3 3 0 0 1-6 0z" clip-rule="evenodd" />
            <path
              fill-rule="evenodd"
              d="M7.5 1a.5.5 0 0 1 .49.4l.24 1.43a5.1 5.1 0 0 1 1.24.72l1.34-.54a.5.5 0 0 1 .6.22l1 1.73a.5.5 0 0 1-.11.64l-1.1.9a5.2 5.2 0 0 1 0 1.44l1.1.9a.5.5 0 0 1 .11.64l-1 1.73a.5.5 0 0 1-.6.22l-1.34-.54a5.1 5.1 0 0 1-1.24.72l-.24 1.43A.5.5 0 0 1 7.5 14a.5.5 0 0 1-.49-.4l-.24-1.43a5.1 5.1 0 0 1-1.24-.72l-1.34.54a.5.5 0 0 1-.6-.22l-1-1.73a.5.5 0 0 1 .11-.64l1.1-.9a5.2 5.2 0 0 1 0-1.44l-1.1-.9a.5.5 0 0 1-.11-.64l1-1.73a.5.5 0 0 1 .6-.22l1.34.54a5.1 5.1 0 0 1 1.24-.72l.24-1.43A.5.5 0 0 1 7.5 1z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
      </div>
    </nav>

    <div class="layout">
      <!-- LEFT: Timer -->
      <div class="timer-col">
        <!-- Mode tabs -->
        <div class="mode-tabs" id="mode-tabs">
          <button class="mode-tab active" data-mode="pomodoro">Pomodoro</button>
          <button class="mode-tab" data-mode="short">Nghỉ ngắn</button>
          <button class="mode-tab" data-mode="long">Nghỉ dài</button>
        </div>

        <!-- Timer ring -->
        <div class="timer-ring-wrap">
          <svg class="ring-svg" viewBox="0 0 220 220">
            <circle class="ring-bg" cx="110" cy="110" r="96" />
            <circle class="ring-progress" id="ring-progress" cx="110" cy="110" r="96" />
          </svg>
          <div class="timer-center">
            <div class="timer-display" id="timer-display">25:00</div>
            <div class="timer-label" id="timer-label">Tập trung</div>
          </div>
        </div>

        <!-- Session dots -->
        <div class="session-dots" id="session-dots"></div>

        <!-- Controls -->
        <div class="controls">
          <button class="ctrl-btn secondary" id="reset-btn" title="Reset">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z" clip-rule="evenodd" />
              <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z" />
            </svg>
          </button>
          <button class="ctrl-btn primary" id="start-btn">
            <svg id="play-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <path d="M6.3 2.84A1.5 1.5 0 0 0 4 4.11v11.78a1.5 1.5 0 0 0 2.3 1.27l9.34-5.89a1.5 1.5 0 0 0 0-2.54L6.3 2.84z" />
            </svg>
            <svg id="pause-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" style="display: none">
              <path
                fill-rule="evenodd"
                d="M5.75 3a.75.75 0 0 0-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 0 0 .75-.75V3.75A.75.75 0 0 0 7.25 3h-1.5zm5 0a.75.75 0 0 0-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 0 0 .75-.75V3.75A.75.75 0 0 0 12.25 3h-1.5z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
          <button class="ctrl-btn secondary" id="skip-btn" title="Bỏ qua">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M12.5 4a.5.5 0 0 0-1 0v3.248L5.233 3.612C4.536 3.177 4 3.214 4 4.305v7.39c0 1.091.536 1.128 1.233.693L11.5 8.752V12a.5.5 0 0 0 1 0V4z" />
            </svg>
          </button>
        </div>

        <!-- Task input -->
        <div class="task-section">
          <div class="task-label">Đang làm</div>
          <div class="task-input-wrap">
            <input type="text" id="current-task" class="task-input" placeholder="Nhập task đang tập trung..." maxlength="80" />
          </div>
        </div>
      </div>

      <!-- RIGHT: Stats & History -->
      <div class="stats-col">
        <!-- Today stats -->
        <div class="card">
          <div class="card-title">Hôm nay</div>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-val" id="s-pomodoros">0</div>
              <div class="stat-lbl">🍅 Pomodoros</div>
            </div>
            <div class="stat-item">
              <div class="stat-val" id="s-focus-time">0m</div>
              <div class="stat-lbl">⏱ Tập trung</div>
            </div>
            <div class="stat-item">
              <div class="stat-val" id="s-breaks">0</div>
              <div class="stat-lbl">☕ Nghỉ</div>
            </div>
            <div class="stat-item">
              <div class="stat-val" id="s-streak">0</div>
              <div class="stat-lbl">🔥 Streak</div>
            </div>
          </div>
        </div>

        <!-- Weekly chart -->
        <div class="card">
          <div class="card-title">Tuần này</div>
          <div class="weekly-chart" id="weekly-chart"></div>
          <div class="weekly-labels" id="weekly-labels"></div>
        </div>

        <!-- Session log -->
        <div class="card">
          <div class="card-header-row">
            <div class="card-title">Lịch sử hôm nay</div>
            <button class="clear-btn" id="clear-log-btn">Xóa</button>
          </div>
          <div class="log-list" id="log-list">
            <div class="log-empty">Chưa có session nào hôm nay</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings panel -->
    <div class="settings-backdrop" id="settings-backdrop">
      <div class="settings-panel" id="settings-panel">
        <div class="settings-header">
          <div class="settings-title">Cài đặt</div>
          <button class="icon-btn" id="settings-close">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <path
                d="M2.22 2.22a.75.75 0 0 1 1.06 0L7 5.94l3.72-3.72a.75.75 0 1 1 1.06 1.06L8.06 7l3.72 3.72a.75.75 0 1 1-1.06 1.06L7 8.06l-3.72 3.72a.75.75 0 0 1-1.06-1.06L5.94 7 2.22 3.28a.75.75 0 0 1 0-1.06z"
              />
            </svg>
          </button>
        </div>

        <div class="settings-body">
          <div class="settings-section-label">Thời gian (phút)</div>

          <div class="settings-row">
            <label>Pomodoro</label>
            <div class="num-input-wrap">
              <button class="num-btn" data-target="set-pomodoro" data-delta="-1">−</button>
              <input type="number" id="set-pomodoro" value="25" min="1" max="99" />
              <button class="num-btn" data-target="set-pomodoro" data-delta="1">+</button>
            </div>
          </div>

          <div class="settings-row">
            <label>Nghỉ ngắn</label>
            <div class="num-input-wrap">
              <button class="num-btn" data-target="set-short" data-delta="-1">−</button>
              <input type="number" id="set-short" value="5" min="1" max="60" />
              <button class="num-btn" data-target="set-short" data-delta="1">+</button>
            </div>
          </div>

          <div class="settings-row">
            <label>Nghỉ dài</label>
            <div class="num-input-wrap">
              <button class="num-btn" data-target="set-long" data-delta="-1">−</button>
              <input type="number" id="set-long" value="15" min="1" max="60" />
              <button class="num-btn" data-target="set-long" data-delta="1">+</button>
            </div>
          </div>

          <div class="settings-row">
            <label>Nghỉ dài sau</label>
            <div class="num-input-wrap">
              <button class="num-btn" data-target="set-long-interval" data-delta="-1">−</button>
              <input type="number" id="set-long-interval" value="4" min="2" max="10" />
              <button class="num-btn" data-target="set-long-interval" data-delta="1">+</button>
            </div>
          </div>

          <div class="settings-section-label" style="margin-top: 20px">Tuỳ chọn</div>

          <div class="settings-row">
            <label>Tự động bắt đầu break</label>
            <div class="toggle-wrap">
              <input type="checkbox" id="set-auto-break" class="toggle-input" />
              <label for="set-auto-break" class="toggle-label"></label>
            </div>
          </div>

          <div class="settings-row">
            <label>Tự động bắt đầu Pomodoro</label>
            <div class="toggle-wrap">
              <input type="checkbox" id="set-auto-pomo" class="toggle-input" />
              <label for="set-auto-pomo" class="toggle-label"></label>
            </div>
          </div>

          <button class="save-settings-btn" id="save-settings-btn">Lưu cài đặt</button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script src="./script.js"></script>
  </body>
</html>
