<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noted — Ghi chú của bạn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <div class="logo-mark">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M3 2.5A.5.5 0 0 1 3.5 2h8a.5.5 0 0 1 .5.5v10a.5.5 0 0 1-.5.5h-8A.5.5 0 0 1 3 12.5v-10zM4 3v9h7V3H4z" fill="currentColor" />
              <path d="M5.5 5.5h4v1h-4v-1zM5.5 7.5h4v1h-4v-1zM5.5 9.5h2.5v1H5.5v-1z" fill="currentColor" />
            </svg>
          </div>
          <span class="logo-text">Noted</span>
        </div>

        <button class="new-btn" id="new-btn" title="Ghi chú mới (Ctrl+N)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <path d="M7 1a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 7 1z" />
          </svg>
          Ghi chú mới
        </button>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
          <path fill-rule="evenodd" d="M6 1a5 5 0 1 0 3.197 8.906l2.45 2.45a.75.75 0 1 0 1.06-1.06l-2.45-2.45A5 5 0 0 0 6 1zM2.5 6a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z" clip-rule="evenodd" />
        </svg>
        <input type="text" class="search-input" id="search-input" placeholder="Tìm kiếm ghi chú..." />
        <button class="search-clear" id="search-clear" aria-label="Xóa tìm kiếm">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
            <path d="M6 5.03 9.47 1.56a.69.69 0 0 1 .97.97L6.97 6l3.47 3.47a.69.69 0 0 1-.97.97L6 6.97 2.53 10.44a.69.69 0 0 1-.97-.97L5.03 6 1.56 2.53a.69.69 0 0 1 .97-.97L6 5.03z" />
          </svg>
        </button>
      </div>

      <!-- Tags filter -->
      <div class="tags-section">
        <div class="tags-label">Tags</div>
        <div class="tags-list" id="tags-list">
          <button class="tag-filter active" data-tag="all">Tất cả</button>
        </div>
      </div>

      <!-- Note list -->
      <div class="note-list" id="note-list"></div>

      <div class="sidebar-footer">
        <span id="note-count">0 ghi chú</span>
        <button class="icon-btn danger" id="delete-btn" title="Xóa ghi chú này" style="display: none">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <path d="M5.5 5.5A.5.5 0 0 1 6 6v4a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 0a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5z" />
            <path
              fill-rule="evenodd"
              d="M14.5 3a1 1 0 0 1-1 1H13v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1h2.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V11a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"
              clip-rule="evenodd"
            />
          </svg>
          Xóa
        </button>
      </div>
    </aside>

    <!-- Editor area -->
    <main class="editor-area" id="editor-area">
      <!-- Toolbar -->
      <div class="toolbar" id="toolbar">
        <div class="toolbar-left">
          <button class="icon-btn" id="sidebar-toggle" title="Ẩn/hiện sidebar">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
              <path d="M1.5 3h12a.5.5 0 0 1 0 1h-12a.5.5 0 0 1 0-1zm0 4h12a.5.5 0 0 1 0 1h-12a.5.5 0 0 1 0-1zm0 4h12a.5.5 0 0 1 0 1h-12a.5.5 0 0 1 0-1z" />
            </svg>
          </button>
          <div class="toolbar-sep"></div>
          <button class="fmt-btn" data-cmd="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
          <button class="fmt-btn italic" data-cmd="italic" title="Italic (Ctrl+I)"><em>I</em></button>
          <button class="fmt-btn" data-cmd="strikethrough" title="Gạch ngang"><s>S</s></button>
          <div class="toolbar-sep"></div>
          <button class="fmt-btn" data-cmd="insertUnorderedList" title="Danh sách">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <path
                d="M2 3.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm0 4a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm0 4a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zM3.5 3h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1 0-1zm0 4h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1 0-1zm0 4h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1 0-1z"
              />
            </svg>
          </button>
          <button class="fmt-btn" data-cmd="insertOrderedList" title="Danh sách đánh số">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <path
                d="M1 2h1.5v3H1.5V3H1V2zm2.5 1.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1 0-1zM1 8.5l.5-.5.5.5v.5H1V8.5zM1 11h1.5v.5h-1v.5h1V13H1v-.5h1v-.5H1V11zm2.5 0h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1 0-1zm0-4h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1 0-1z"
              />
            </svg>
          </button>
          <div class="toolbar-sep"></div>
          <button class="fmt-btn" data-action="h1" title="Tiêu đề lớn">H1</button>
          <button class="fmt-btn" data-action="h2" title="Tiêu đề nhỏ">H2</button>
          <button class="fmt-btn" data-action="code" title="Code block">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M9.5 3.5 13 7l-3.5 3.5-.7-.7L11.6 7 8.8 4.2l.7-.7zm-5 0 .7.7L2.4 7l2.8 2.8-.7.7L1 7l3.5-3.5z" /></svg>
          </button>
          <button class="fmt-btn" data-action="quote" title="Trích dẫn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <path
                d="M3.5 2C2.1 2 1 3.1 1 4.5S2.1 7 3.5 7c.3 0 .5.2.5.5C4 8.9 3.3 10 2 11l1 1c1.8-1.2 3-3.2 3-5.5C6 3.1 4.9 2 3.5 2zm7 0C9.1 2 8 3.1 8 4.5S9.1 7 10.5 7c.3 0 .5.2.5.5 0 1.4-.7 2.5-2 3.5l1 1c1.8-1.2 3-3.2 3-5.5C13 3.1 11.9 2 10.5 2z"
              />
            </svg>
          </button>
        </div>
        <div class="toolbar-right">
          <div class="word-count" id="word-count">0 từ</div>
          <button class="icon-btn" id="pin-btn" title="Ghim ghi chú">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M9.5 1.5 12.5 4.5 9 8l-.5 3.5-1-1L9 8l-3-3-1.5 1.5L3 5l4-4 2.5.5z" /></svg>
          </button>
          <div class="tag-input-wrap" id="tag-input-wrap">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
              <path d="M10.5 1h-4a.5.5 0 0 0-.35.15l-5 5a.5.5 0 0 0 0 .7l4 4a.5.5 0 0 0 .7 0l5-5A.5.5 0 0 0 11 5.5v-4A.5.5 0 0 0 10.5 1zM8.5 4a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1z" />
            </svg>
            <input type="text" id="tag-input" placeholder="Thêm tag..." />
          </div>
          <div class="tags-inline" id="tags-inline"></div>
        </div>
      </div>

      <!-- Title input -->
      <div class="title-wrap" id="title-wrap">
        <input type="text" class="note-title" id="note-title" placeholder="Tiêu đề..." maxlength="120" />
      </div>

      <!-- Editor -->
      <div class="editor-wrap">
        <div class="editor" id="editor" contenteditable="true" spellcheck="false" data-placeholder="Bắt đầu ghi chú..."></div>
      </div>

      <!-- Empty state (no note selected) -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="currentColor">
            <path d="M8 6a2 2 0 0 1 2-2h20a2 2 0 0 1 2 2v28a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2V6zm2 0v28h20V6H10zm4 5h12v2H14v-2zm0 5h12v2H14v-2zm0 5h7v2h-7v-2z" />
          </svg>
        </div>
        <p class="empty-title">Chọn ghi chú để bắt đầu</p>
        <p class="empty-sub">Hoặc tạo mới bằng nút <strong>+</strong> bên trái</p>
        <button class="btn-create" id="create-from-empty">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="currentColor">
            <path d="M7 1a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 7 1z" />
          </svg>
          Tạo ghi chú mới
        </button>
      </div>
    </main>

    <!-- Context menu -->
    <div class="ctx-menu" id="ctx-menu">
      <button class="ctx-item" id="ctx-pin">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="currentColor"><path d="M9.5 1.5 12.5 4.5 9 8l-.5 3.5-1-1L9 8l-3-3-1.5 1.5L3 5l4-4 2.5.5z" /></svg>
        <span id="ctx-pin-label">Ghim</span>
      </button>
      <button class="ctx-item danger" id="ctx-delete">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="currentColor">
          <path d="M5.5 5.5A.5.5 0 0 1 6 6v4a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 0a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5z" />
          <path
            fill-rule="evenodd"
            d="M14.5 3a1 1 0 0 1-1 1H13v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1h2.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V11a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"
            clip-rule="evenodd"
          />
        </svg>
        Xóa
      </button>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toasts"></div>

    <script src="./script.js"></script>
  </body>
</html>
